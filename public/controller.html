<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LovenseControl Controller</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/controller.js" defer></script>
</head>
<body>
  <main class="controller-shell">
    <section class="controller-card">
      <p class="eyebrow">LovenseControl</p>
      <h1 id="controller-title">Controller</h1>
      <p id="room-label" class="hint">Waiting for a room.</p>

      <div class="controller-status">
        <span class="status-label">Status</span>
        <strong id="controller-status">Not connected</strong>
        <p id="controller-note">
          Ask the host for an invite link. The host approves access before this page can send requests.
        </p>
      </div>

      <div class="controller-status toy-assignment">
        <span class="status-label">Assigned Toy</span>
        <strong id="assigned-toy">Not assigned yet</strong>
        <p id="assigned-toy-note">The host chooses which toy this controller can affect.</p>
      </div>

      <label>
        Display name
        <input id="controller-name" autocomplete="name" value="Controller">
      </label>
      <button id="request-access" type="button">Request Control</button>

      <label class="control-label">
        Intensity request
        <input id="intensity" type="range" min="0" max="20" value="0" disabled>
      </label>
      <output id="intensity-output">0 / 20</output>

      <div class="button-row controller-actions">
        <button id="send-held" type="button" disabled>Send While Held</button>
        <button id="release-stop" type="button" class="danger-button" disabled>Release / Stop</button>
      </div>
    </section>
  </main>
</body>
</html>
